<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body {background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
    header {display:flex;justify-content:space-between;padding:20px 40px;}
    nav a {margin-left:20px;color:white;text-decoration:none;}
    nav a:hover {color:#00f2fe;}
    .btn-nav {padding:6px 14px;border-radius:20px;background:linear-gradient(45deg,#00f2fe,#4facfe);color:black;}
    .hero {height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
    .btn {padding:12px 25px;border-radius:30px;background:linear-gradient(45deg,#00f2fe,#4facfe);color:black;text-decoration:none;}
  </style>
</head>
<body>

<header>
  <h1>TRABALHO</h1>
  <nav>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('profile') }}">Perfil</a>
    <a href="{{ url_for('auth.login') }}">Login</a>
    <a href="{{ url_for('auth.signup') }}" class="btn-nav">Criar Conta</a>
    <a href="{{ url_for('auth.logout') }}">Logout</a>
  </nav>
</header>

<section class="hero">
  <h2>Raspberry <span style="color:#00f2fe;">PI</span></h2>
  <p>Augusto Saucedo, João Voese, Louis Aslan.</p>
  <a href="{{ url_for('auth.signup') }}" class="btn">Começar</a>
</section>

</body>
</html>
